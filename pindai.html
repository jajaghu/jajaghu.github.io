<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Mind Scan</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      width: 100vw;
      height: 100vh;
    }

    #ar-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0a0a1a 0%, #0d1b2a 50%, #0a0a1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
      position: relative;
    }

    .loading-logo svg {
      width: 100%;
      height: 100%;
      animation: rotateLogo 4s linear infinite;
    }

    @keyframes rotateLogo {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .loading-title {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .loading-subtitle {
      font-size: 13px;
      color: #4fc3f7;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .loading-bar-wrap {
      width: 260px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4fc3f7, #00e5ff);
      border-radius: 2px;
      transition: width 0.3s ease;
      box-shadow: 0 0 12px #4fc3f7;
    }

    .loading-text {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
    }

    #hud-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }

    .corner {
      position: absolute;
      width: 40px;
      height: 40px;
    }
    .corner::before,
    .corner::after {
      content: '';
      position: absolute;
      background: #4fc3f7;
      opacity: 0.8;
    }
    .corner-tl { top: 16px; left: 16px; }
    .corner-tl::before { top:0; left:0; width:100%; height:2px; }
    .corner-tl::after  { top:0; left:0; width:2px;  height:100%; }

    .corner-tr { top: 16px; right: 16px; }
    .corner-tr::before { top:0; right:0; width:100%; height:2px; }
    .corner-tr::after  { top:0; right:0; width:2px;  height:100%; }

    .corner-bl { bottom: 16px; left: 16px; }
    .corner-bl::before { bottom:0; left:0; width:100%; height:2px; }
    .corner-bl::after  { bottom:0; left:0; width:2px;  height:100%; }

    .corner-br { bottom: 16px; right: 16px; }
    .corner-br::before { bottom:0; right:0; width:100%; height:2px; }
    .corner-br::after  { bottom:0; right:0; width:2px;  height:100%; }

    #hud-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
    }

    #hud-title {
      font-size: 13px;
      font-weight: 700;
      color: #4fc3f7;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    #hud-status {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4fc3f7;
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.active { background: #00e676; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    #info-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 24px 32px;
      background: linear-gradient(0deg, rgba(0,0,0,0.75) 0%, transparent 100%);
      transform: translateY(100%);
      transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
      pointer-events: auto;
    }

    #info-panel.visible { transform: translateY(0); }

    #info-panel-number {
      font-size: 11px;
      color: #4fc3f7;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    #info-panel-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    #info-panel-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
      margin-bottom: 16px;
      max-width: 420px;
    }

    #audio-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #btn-play-pause {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(79,195,247,0.15);
      border: 1px solid rgba(79,195,247,0.4);
      color: #4fc3f7;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      pointer-events: auto;
    }

    #btn-play-pause:hover {
      background: rgba(79,195,247,0.3);
      border-color: #4fc3f7;
    }

    #btn-play-pause svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .audio-waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 24px;
    }

    .wave-bar {
      width: 3px;
      background: #4fc3f7;
      border-radius: 2px;
      opacity: 0.6;
      animation: none;
    }

    .wave-bar.playing { animation: waveBounce 0.8s ease-in-out infinite; }

    .wave-bar:nth-child(1) { animation-delay: 0.0s; height: 8px; }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 14px; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 20px; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 12px; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 18px; }
    .wave-bar:nth-child(6) { animation-delay: 0.2s; height: 10px; }
    .wave-bar:nth-child(7) { animation-delay: 0.1s; height: 16px; }

    @keyframes waveBounce {
      0%, 100% { transform: scaleY(0.4); }
      50%       { transform: scaleY(1.2); }
    }

    #scan-indicator {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
      height: 180px;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #scan-indicator.hidden { opacity: 0; }

    #scan-indicator svg {
      width: 100%;
      height: 100%;
      animation: scanRotate 3s linear infinite;
    }

    @keyframes scanRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .scan-label {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: rgba(79,195,247,0.7);
      letter-spacing: 3px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #target-counter {
      position: absolute;
      top: 56px; right: 24px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
      text-align: right;
    }

    #target-counter span {
      color: #4fc3f7;
      font-weight: 700;
      font-size: 18px;
    }

    #toast {
      position: absolute;
      top: 64px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: rgba(79,195,247,0.15);
      border: 1px solid rgba(79,195,247,0.5);
      color: #4fc3f7;
      font-size: 12px;
      letter-spacing: 2px;
      padding: 10px 24px;
      border-radius: 4px;
      white-space: nowrap;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
      backdrop-filter: blur(8px);
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>

  <!-- ===== DEPENDENCIES =====
       URUTAN WAJIB: Three.js → GLTFLoader → MindAR → Howler → app.js
  ========================== -->

<!-- 1. MindAR - sudah include Three.js di dalamnya -->
  <script src="https://unpkg.com/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

  <!-- 2. Howler.js untuk audio -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

 
</head>

<body>

  <div id="loading-screen">
    <div class="loading-logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="46" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.4"/>
        <circle cx="50" cy="50" r="34" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="4 8" opacity="0.6"/>
        <circle cx="50" cy="50" r="18" stroke="#00e5ff" stroke-width="2" fill="rgba(79,195,247,0.08)"/>
        <path d="M42 44 Q40 38 44 36 Q48 33 50 36 Q52 33 56 36 Q60 38 58 44 Q62 46 60 52 Q58 56 54 56 L46 56 Q42 56 40 52 Q38 46 42 44Z"
              stroke="#4fc3f7" stroke-width="1.5" fill="rgba(79,195,247,0.15)"/>
        <line x1="28" y1="50" x2="36" y2="50" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
        <line x1="64" y1="50" x2="72" y2="50" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
        <line x1="50" y1="28" x2="50" y2="36" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
        <line x1="50" y1="64" x2="50" y2="72" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
      </svg>
    </div>
    <div class="loading-title">Mind Scan AR</div>
    <div class="loading-subtitle">Augmented Reality Experience</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar" id="loading-bar"></div>
    </div>
    <div class="loading-text" id="loading-text">INITIALIZING SYSTEM...</div>
  </div>

  <div id="ar-container"></div>

  <div id="hud-overlay">

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>

    <div id="hud-top">
      <div id="hud-title">Mind Scan AR</div>
      <div id="hud-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">SCANNING</span>
      </div>
    </div>

    <div id="target-counter">
      TARGET<br>
      <span id="target-num">—</span>
    </div>

    <div id="scan-indicator">
      <svg viewBox="0 0 180 180" fill="none">
        <circle cx="90" cy="90" r="85" stroke="#4fc3f7" stroke-width="1"
                stroke-dasharray="12 6" opacity="0.3"/>
        <circle cx="90" cy="90" r="70" stroke="#4fc3f7" stroke-width="1.5"
                stroke-dasharray="4 20" opacity="0.5"/>
        <path d="M90 8 L90 22"  stroke="#00e5ff" stroke-width="2"/>
        <path d="M90 158 L90 172" stroke="#00e5ff" stroke-width="2"/>

    <div id="info-panel">
      <div id="info-panel-number">TARGET 01 / 12</div>
      <div id="info-panel-title">Nama Objek</div>
      <div id="info-panel-desc">Deskripsi singkat tentang objek 3D yang ditampilkan.</div>
      <div id="audio-controls">
        <button id="btn-play-pause">
          <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>

          <span id="btn-label">PLAY AUDIO</span>
        </button>
        <div class="audio-waveform" id="waveform">
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
        </div>
      </div>
    </div>

    <div id="toast">TARGET TERDETEKSI</div>

  </div>

 <!-- 3. app.js PALING TERAKHIR -->
  <script src="https://jajaghu.infinityfree.me/proxy.php?file=js/app.js"></script>

</body>
</html>
